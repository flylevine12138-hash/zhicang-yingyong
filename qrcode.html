<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智舱测 - 二维码</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }
        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
        }
        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
        }
        .qr-code {
            margin: 30px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
            display: inline-block;
        }
        .qr-code img {
            width: 300px;
            height: 300px;
            display: block;
        }
        .url {
            background: #e9ecef;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            word-break: break-all;
            font-family: 'Courier New', monospace;
            color: #495057;
            font-size: 14px;
        }
        .tips {
            color: #868e96;
            font-size: 14px;
            margin-top: 20px;
            line-height: 1.6;
        }
        .button {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-size: 16px;
            transition: transform 0.2s;
        }
        .button:hover {
            transform: translateY(-2px);
        }
        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }
            .qr-code img {
                width: 250px;
                height: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
                </linearGradient>
            </defs>
            <rect width="100" height="100" rx="20" fill="url(#bg)"/>
            <text x="50" y="45" font-size="24" fill="white" text-anchor="middle" font-weight="bold">智</text>
            <text x="50" y="70" font-size="24" fill="white" text-anchor="middle" font-weight="bold">舱</text>
        </svg>
        
        <h1>智舱测</h1>
        <div class="subtitle">智能座舱评测应用</div>
        
        <div class="qr-code">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://zhicangce.xiongfeishuo.com" alt="二维码">
        </div>
        
        <div class="url">
            https://zhicangce.xiongfeishuo.com
        </div>
        
        <a href="https://zhicangce.xiongfeishuo.com" class="button">立即体验</a>
        
        <div class="tips">
            📱 使用手机扫描上方二维码<br>
            🚀 即可直接进入智舱测评测应用
        </div>
    </div>
</body>
</html>
