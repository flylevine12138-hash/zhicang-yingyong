<!--
  智舱测 · 数据管理中心
  仅限管理员访问
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a12">
  <title>智舱测 · 数据中心</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a12;
      color: #e0e0e0;
      min-height: 100vh;
    }

    /* ===== 登录页 ===== */
    .login-page {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
      background: radial-gradient(ellipse at center, rgba(123,47,255,0.08) 0%, transparent 70%);
    }
    .login-card {
      background: rgba(20,20,35,0.9);
      border: 1px solid rgba(0,212,255,0.15);
      border-radius: 16px;
      padding: 40px 32px;
      width: 100%; max-width: 380px;
      backdrop-filter: blur(10px);
    }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo h1 {
      font-size: 28px; font-weight: 800;
      background: linear-gradient(135deg, #00D4FF, #7B2FFF);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .login-logo p { color: #888; font-size: 13px; margin-top: 4px; }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block; font-size: 13px; color: #aaa; margin-bottom: 6px;
    }
    .form-group input {
      width: 100%; padding: 12px 14px;
      background: rgba(0,0,0,0.3); border: 1px solid rgba(0,212,255,0.2);
      border-radius: 10px; color: #fff; font-size: 15px; outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: #00D4FF; }
    .btn-login {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #7B2FFF, #00D4FF);
      border: none; border-radius: 10px; color: #fff; font-size: 16px;
      font-weight: 600; cursor: pointer; transition: opacity 0.2s;
    }
    .btn-login:hover { opacity: 0.85; }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-error {
      color: #ff5252; text-align: center; font-size: 13px;
      margin-top: 12px; display: none;
    }

    /* ===== 主界面 ===== */
    .admin-page { display: none; padding: 20px; max-width: 1200px; margin: 0 auto; }
    .admin-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
    }
    .admin-header h1 {
      font-size: 22px; font-weight: 700;
      background: linear-gradient(135deg, #00D4FF, #7B2FFF);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .header-actions { display: flex; gap: 10px; align-items: center; }
    .btn-sm {
      padding: 8px 16px; border-radius: 8px; font-size: 13px;
      cursor: pointer; border: none; font-weight: 500; transition: opacity 0.2s;
    }
    .btn-export { background: rgba(0,212,255,0.15); color: #00D4FF; border: 1px solid rgba(0,212,255,0.3); }
    .btn-logout { background: rgba(255,82,82,0.1); color: #ff5252; border: 1px solid rgba(255,82,82,0.3); }
    .btn-sm:hover { opacity: 0.75; }

    /* 统计卡片 */
    .stats-row {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px; margin-bottom: 24px;
    }
    .stat-card {
      background: rgba(20,20,35,0.8); border: 1px solid rgba(0,212,255,0.1);
      border-radius: 12px; padding: 16px; text-align: center;
    }
    .stat-num { font-size: 28px; font-weight: 800; color: #00D4FF; }
    .stat-label { font-size: 12px; color: #888; margin-top: 4px; }

    /* 筛选栏 */
    .filter-bar {
      display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .filter-bar select, .filter-bar input {
      padding: 8px 12px; background: rgba(0,0,0,0.3);
      border: 1px solid rgba(0,212,255,0.2); border-radius: 8px;
      color: #fff; font-size: 14px; outline: none; min-width: 120px;
    }
    .filter-bar select:focus, .filter-bar input:focus { border-color: #00D4FF; }

    /* 数据表格 */
    .data-table-wrapper {
      overflow-x: auto; border-radius: 12px;
      border: 1px solid rgba(0,212,255,0.1);
    }
    .data-table {
      width: 100%; border-collapse: collapse; font-size: 13px;
    }
    .data-table th {
      background: rgba(123,47,255,0.15); color: #00D4FF;
      padding: 12px 14px; text-align: left; white-space: nowrap;
      font-weight: 600; font-size: 12px;
    }
    .data-table td {
      padding: 11px 14px; border-bottom: 1px solid rgba(255,255,255,0.04);
      vertical-align: middle;
    }
    .data-table tr:hover td { background: rgba(0,212,255,0.04); }
    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-size: 12px; font-weight: 600;
    }
    .badge-excellent { background: rgba(0,230,118,0.15); color: #00E676; }
    .badge-good { background: rgba(0,212,255,0.15); color: #00D4FF; }
    .badge-average { background: rgba(255,215,64,0.15); color: #FFD740; }
    .badge-poor { background: rgba(255,145,0,0.15); color: #FF9100; }
    .badge-bad { background: rgba(255,82,82,0.15); color: #FF5252; }
    .score-big { font-weight: 700; font-size: 15px; color: #00D4FF; }
    .text-dim { color: #666; font-size: 12px; }

    .empty-state {
      text-align: center; padding: 60px 20px; color: #555;
    }
    .empty-state p { font-size: 15px; margin-bottom: 8px; }

    @media (max-width: 600px) {
      .login-card { padding: 28px 20px; }
      .admin-header { flex-direction: column; align-items: flex-start; }
      .filter-bar { flex-direction: column; }
      .filter-bar select, .filter-bar input { width: 100%; }
    }
  </style>
</head>
<body>

<!-- ===== 登录页 ===== -->
<div class="login-page" id="loginPage">
  <div class="login-card">
    <div class="login-logo">
      <h1>智舱测</h1>
      <p>数据中心 · 密码验证</p>
    </div>
    <div class="form-group">
      <label>访问密码</label>
      <input type="password" id="loginPassword" placeholder="输入数据中心访问密码" autocomplete="current-password">
    </div>
    <button class="btn-login" id="btnLogin" onclick="Admin.login()">登录数据中心</button>
    <p class="login-error" id="loginError"></p>
  </div>
</div>

<!-- ===== 主界面 ===== -->
<div class="admin-page" id="adminPage">
  <div class="admin-header">
    <h1>📊 智舱测 · 数据中心</h1>
    <div class="header-actions">
      <button class="btn-sm btn-export" onclick="Admin.exportData()">📥 导出数据</button>
      <button class="btn-sm btn-logout" onclick="Admin.logout()">退出登录</button>
    </div>
  </div>

  <!-- 统计概览 -->
  <div class="stats-row" id="statsRow">
    <div class="stat-card"><div class="stat-num" id="statTotal">--</div><div class="stat-label">总评测数</div></div>
    <div class="stat-card"><div class="stat-num" id="statBrands">--</div><div class="stat-label">品牌数量</div></div>
    <div class="stat-card"><div class="stat-num" id="statCities">--</div><div class="stat-label">覆盖城市</div></div>
    <div class="stat-card"><div class="stat-num" id="statAvgScore">--</div><div class="stat-label">平均得分</div></div>
  </div>

  <!-- 筛选 -->
  <div class="filter-bar">
    <select id="filterBrand" onchange="Admin.loadData()">
      <option value="">全部品牌</option>
    </select>
    <select id="filterCity" onchange="Admin.loadData()">
      <option value="">全部城市</option>
    </select>
    <select id="filterLevel" onchange="Admin.loadData()">
      <option value="">全部等级</option>
      <option value="非常优秀">非常优秀</option>
      <option value="表现良好">表现良好</option>
      <option value="中规中矩">中规中矩</option>
      <option value="有待提升">有待提升</option>
      <option value="体验较差">体验较差</option>
    </select>
  </div>

  <!-- 表格 -->
  <div class="data-table-wrapper">
    <table class="data-table">
      <thead>
        <tr>
          <th>#</th>
          <th>品牌</th>
          <th>城市</th>
          <th>总分</th>
          <th>语音效率</th>
          <th>语音智能</th>
          <th>界面设计</th>
          <th>生态丰富度</th>
          <th>主观体验</th>
          <th>等级</th>
          <th>评测时间</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<script>
// ===== 配置 =====

// 访问密码（你可以随时修改这个密码）
const ACCESS_PASSWORD = 'zhicangce2026';

const Admin = {
  session: null,
  allData: [],

  // 检查是否已登录
  checkSession() {
    const saved = localStorage.getItem('zhicangce_auth');
    if (saved === ACCESS_PASSWORD) {
      this.showAdmin();
      this.loadData();
    }
  },

  // 登录（密码验证）
  async login() {
    const password = document.getElementById('loginPassword').value.trim();
    const btn = document.getElementById('btnLogin');
    const errEl = document.getElementById('loginError');

    btn.disabled = true; btn.textContent = '验证中...';
    errEl.style.display = 'none';

    await new Promise(r => setTimeout(r, 500));

    if (password === ACCESS_PASSWORD) {
      localStorage.setItem('zhicangce_auth', ACCESS_PASSWORD);
      this.showAdmin();
      this.loadData();
    } else {
      errEl.textContent = '密码错误，请重新输入';
      errEl.style.display = 'block';
    }

    btn.disabled = false;
    btn.textContent = '登录数据中心';
  },

  // 退出
  logout() {
    this.session = null;
    this.allData = [];
    localStorage.removeItem('zhicangce_auth');
    document.getElementById('loginPage').style.display = 'flex';
    document.getElementById('adminPage').style.display = 'none';
    document.getElementById('loginPassword').value = '';
  },

  // 显示管理面板
  showAdmin() {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('adminPage').style.display = 'block';
  },

  // 加载数据
  // 加载数据（从本地JSON文件读取，无跨域问题）
  async loadData() {
    try {
      const res = await fetch('data/evaluations.json');

      if (!res.ok) throw new Error(`加载数据失败: ${res.status}`);

      this.allData = await res.json();

      // 客户端筛选
      const brandFilter = document.getElementById('filterBrand').value;
      const cityFilter = document.getElementById('filterCity').value;
      const levelFilter = document.getElementById('filterLevel').value;

      let filtered = this.allData;
      if (brandFilter) filtered = filtered.filter(r => r.brand === brandFilter);
      if (cityFilter) filtered = filtered.filter(r => r.city === cityFilter);
      if (levelFilter) filtered = filtered.filter(r => r.level === levelFilter);

      // 临时替换用于渲染
      const originalData = this.allData;
      this.allData = filtered;
      this.renderTable();
      this.updateStats();
      this.updateFilters();
      this.allData = originalData;

    } catch(e) {
      console.error('加载失败:', e);
      document.getElementById('tableBody').innerHTML =
        `<tr><td colspan="11" class="empty-state"><p>⚠️ 加载数据失败</p><p style="font-size:12px">${e.message}</p></td></tr>`;
    }
  },

  // 渲染表格
  renderTable() {
    const tbody = document.getElementById('tableBody');

    if (!this.allData.length) {
      tbody.innerHTML = `<tr><td colspan="11" class="empty-state"><p>暂无评测数据</p><p style="font-size:12px">用户提交的评测报告将在这里显示</p></td></tr>`;
      return;
    }

    const levelBadgeClass = {
      '非常优秀': 'badge-excellent',
      '表现良好': 'badge-good',
      '中规中矩': 'badge-average',
      '有待提升': 'badge-poor',
      '体验较差': 'badge-bad'
    };

    tbody.innerHTML = this.allData.map((r, i) => `
      <tr>
        <td>${i + 1}</td>
        <td><strong>${this.esc(r.brand)}</strong></td>
        <td>${this.esc(r.city)}</td>
        <td class="score-big">${r.total_score ?? '--'}</td>
        <td>${r.voice_efficiency_score ?? '--'}</td>
        <td>${r.voice_smart_score ?? '--'}</td>
        <td>${r.interface_score ?? '--'}</td>
        <td>${r.ecosystem_score ?? '--'}</td>
        <td>${r.subjective_score ?? '--'}</td>
        <td><span class="badge ${levelBadgeClass[r.level] || 'badge-average'}">${this.esc(r.level || '--')}</span></td>
        <td class="text-dim">${fmtDate(r.submitted_at)}</td>
      </tr>
    `).join('');
  },

  // 更新统计
  updateStats() {
    const d = this.allData;
    document.getElementById('statTotal').textContent = d.length;

    const brands = [...new Set(d.map(r => r.brand).filter(Boolean))];
    document.getElementById('statBrands').textContent = brands.length;

    const cities = [...new Set(d.map(r => r.city).filter(Boolean))];
    document.getElementById('statCities').textContent = cities.length;

    const scores = d.filter(r => r.total_score != null).map(r => r.total_score);
    const avg = scores.length ? Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) : '--';
    document.getElementById('statAvgScore').textContent = avg;
  },

  // 更新筛选选项
  updateFilters() {
    const brands = [...new Set(this.allData.map(r => r.brand).filter(Boolean))].sort();
    const cities = [...new Set(this.allData.map(r => r.city).filter(Boolean))].sort();

    const brandSel = document.getElementById('filterBrand');
    const curBrand = brandSel.value;
    brandSel.innerHTML = '<option value="">全部品牌</option>' +
      brands.map(b => `<option value="${this.esc(b)}"${b===curBrand?' selected':''}>${this.esc(b)}</option>`).join('');

    const citySel = document.getElementById('filterCity');
    const curCity = citySel.value;
    citySel.innerHTML = '<option value="">全部城市</option>' +
      cities.map(c => `<option value="${this.esc(c)}"${c===curCity?' selected':''}>${this.esc(c)}</option>`).join('');
  },

  // 导出数据
  exportData() {
    if (!this.allData.length) { alert('暂无数据可导出'); return; }

    // CSV导出
    const headers = ['序号','品牌','城市','总分','语音效率','语音智能','界面设计','生态丰富度','主观体验','等级','一句话评价','评测耗时(分钟)','提交时间'];
    const rows = this.allData.map((r,i) => [
      i+1, r.brand, r.city, r.total_score,
      r.voice_efficiency_score, r.voice_smart_score,
      r.interface_score, r.ecosystem_score, r.subjective_score,
      r.level, `"${(r.one_liner||'').replace(/"/g,'""')}"`,
      r.duration_min, r.submitted_at
    ]);

    const csv = '\uFEFF' + [headers, ...rows].map(row => row.join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `智舱测_评测数据_${new Date().toISOString().slice(0,10)}.csv`;
    a.click(); URL.revokeObjectURL(a.href);
  },

  esc(str) { if(!str) return ''; return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
};

function fmtDate(s) {
  if (!s) return '--';
  const d = new Date(s);
  if (isNaN(d.getTime())) return s;
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// 初始化
document.addEventListener('DOMContentLoaded', () => Admin.checkSession());

// 回车登录
document.getElementById('loginPassword').addEventListener('keydown', e => {
  if (e.key === 'Enter') Admin.login();
});
</script>

</body>
</html>
