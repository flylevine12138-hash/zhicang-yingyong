<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="purple" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7B2FFF"/>
      <stop offset="100%" stop-color="#7B2FFF" stop-opacity="0.6"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="48%" r="50%">
      <stop offset="0%" stop-color="#7B2FFF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <circle cx="256" cy="245" r="180" fill="url(#glow)"/>

  <!-- 外圈装饰环 -->
  <circle cx="256" cy="245" r="195" fill="none" stroke="#00D4FF" stroke-width="1.5" opacity="0.2"/>
  <circle cx="256" cy="245" r="180" fill="none" stroke="#7B2FFF" stroke-width="1" opacity="0.15" stroke-dasharray="12,6"/>

  <!-- ===== 智舱概念视角（从后往前看） ===== -->

  <!-- 挡风玻璃区域 - 上部分（梯形透明感） -->
  <path d="M118 118 L394 118 Q400 116 400 110 L400 92 Q400 78 390 72 L122 72 Q112 78 112 92 L112 110 Q112 116 118 118Z"
        fill="rgba(0,212,255,0.04)" stroke="#00D4FF" stroke-width="2.5" opacity="0.7"/>

  <!-- 挡风玻璃内的HUD投影光线 -->
  <line x1="256" y1="118" x2="256" y2="90" stroke="#7B2FFF" stroke-width="1.5" opacity="0.3" stroke-dasharray="4,3"/>
  <!-- HUD投影内容 - 小方块组 -->
  <rect x="226" y="88" width="60" height="3" rx="1.5" fill="#7B2FFF" opacity="0.35"/>
  <rect x="242" y="94" width="28" height="2" rx="1" fill="#7B2FFF" opacity="0.25"/>

  <!-- 中控台顶部 - 仪表区域 -->
  <rect x="176" y="155" width="160" height="6" rx="3" fill="rgba(0,212,255,0.08)" stroke="#00D4FF" stroke-width="1.5"/>

  <!-- 中控大屏 - 垂直悬浮屏（概念感） -->
  <rect x="198" y="168" width="116" height="82" rx="8" fill="rgba(123,47,255,0.10)" stroke="#7B2FFF" stroke-width="2.2"/>
  <!-- 屏幕内容 - 抽象UI线条 -->
  <rect x="208" y="178" width="96" height="4" rx="2" fill="#00D4FF" opacity="0.5"/>
  <rect x="208" y="188" width="60" height="3" rx="1.5" fill="#00D4FF" opacity="0.3"/>
  <rect x="208" y="198" width="80" height="3" rx="1.5" fill="#7B2FFF" opacity="0.4"/>
  <!-- 屏幕中央波形/图表 -->
  <polyline points="212,220 228,212 244,224 260,210 276,222 292,214" fill="none" stroke="#00D4FF" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
  <rect x="208" y="230" width="40" height="3" rx="1.5" fill="#7B2FFF" opacity="0.3"/>
  <rect x="256" y="230" width="48" height="3" rx="1.5" fill="#00D4FF" opacity="0.25"/>

  <!-- 中控台延伸到两侧的线条 -->
  <line x1="176" y1="161" x2="92" y2="175" stroke="#00D4FF" stroke-width="1.2" opacity="0.25"/>
  <line x1="336" y1="161" x2="420" y2="175" stroke="#00D4FF" stroke-width="1.2" opacity="0.25"/>

  <!-- 方向盘 - 底部（概念感圆环） -->
  <!-- 方向盘外圈 -->
  <ellipse cx="256" cy="305" rx="82" ry="48" fill="none" stroke="url(#cyan)" stroke-width="4" opacity="0.75"/>
  <!-- 方向盘内圈 -->
  <ellipse cx="256" cy="305" rx="60" ry="35" fill="none" stroke="#7B2FFF" stroke-width="2" opacity="0.35"/>
  <!-- 方向盘横梁（左右） -->
  <line x1="186" y1="305" x2="212" y2="305" stroke="#00D4FF" stroke-width="3" opacity="0.5" stroke-linecap="round"/>
  <line x1="300" y1="305" x2="326" y2="305" stroke="#00D4FF" stroke-width="3" opacity="0.5" stroke-linecap="round"/>
  <!-- 方向盘中心（智能气囊区域） -->
  <circle cx="256" cy="305" r="16" fill="rgba(123,47,255,0.15)" stroke="#7B2FFF" stroke-width="1.5" opacity="0.5"/>
  <circle cx="256" cy="305" r="6" fill="#7B2FFF" opacity="0.4"/>

  <!-- 方向盘下方的仪表盘/控制区 -->
  <rect x="222" y="352" width="68" height="28" rx="5" fill="rgba(0,212,255,0.05)" stroke="#00D4FF" stroke-width="1.2" opacity="0.35"/>
  <!-- 仪表盘内小指示点 -->
  <circle cx="240" cy="366" r="3" fill="#00D4FF" opacity="0.5"/>
  <circle cx="256" cy="366" r="3" fill="#7B2FFF" opacity="0.5"/>
  <circle cx="272" cy="366" r="3" fill="#00D4FF" opacity="0.5"/>

  <!-- 座舱两侧车门/氛围灯 -->
  <circle cx="100" cy="200" r="3" fill="#00D4FF" opacity="0.4"/>
  <circle cx="100" cy="240" r="2.5" fill="#00D4FF" opacity="0.3"/>
  <circle cx="100" cy="280" r="2" fill="#00D4FF" opacity="0.2"/>
  <circle cx="412" cy="200" r="3" fill="#00D4FF" opacity="0.4"/>
  <circle cx="412" cy="240" r="2.5" fill="#00D4FF" opacity="0.3"/>
  <circle cx="412" cy="280" r="2" fill="#00D4FF" opacity="0.2"/>

  <!-- 底部座椅轮廓暗示 -->
  <ellipse cx="160" cy="395" rx="36" ry="12" fill="none" stroke="#00D4FF" stroke-width="1.2" opacity="0.12"/>
  <ellipse cx="352" cy="395" rx="36" ry="12" fill="none" stroke="#00D4FF" stroke-width="1.2" opacity="0.12"/>

  <!-- 应用名称 -->
  <text x="256" y="455" text-anchor="middle" fill="url(#cyan)" font-family="sans-serif" font-size="56" font-weight="800" letter-spacing="4">智舱测</text>
</svg>